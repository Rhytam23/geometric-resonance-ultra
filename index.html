<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quantum Flux</title>

    <meta name="google-site-verification" content="H1RxcPFfU4EwlRMEc756uThyEvNJtzXU13KphSeCH5o">
    <meta name="description"
        content="Quantum Flux is an interactive particle gravity experiment built with WebGL, Three.js, and WebAssembly. Experience real-time physics and creative coding directly in the browser.">
    <meta name="keywords"
        content="particle gravity, webgl particles, three.js, webassembly, wasm, creative coding, physics simulation, browser graphics">
    <meta name="author" content="Yogender">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Quantum Flux – Particle Gravity Fun">
    <meta property="og:description"
        content="An interactive particle gravity experiment built with WebGL, Three.js, and WebAssembly (WASM).">
    <meta property="og:image" content="https://particle-gravity-fun.pages.dev/demo.gif">
    <meta property="og:url" content="https://particle-gravity-fun.pages.dev">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg: #030712;
            --panel: rgba(12, 12, 18, 0.10);
            --panel-strong: rgba(12, 12, 18, 0.13);
            --border: rgba(255, 255, 255, 0.09);
            --border-accent: rgba(116, 248, 255, 0.18);
            --text: rgba(255, 255, 255, 0.90);
            --muted: rgba(255, 255, 255, 0.55);
            --accent: #74f8ff;
            --accent-soft: rgba(116, 248, 255, 0.12);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0,0,0,0.10);
            --hud-blur: 20px;
            --hud-radius: 1.5rem;
            --hud-opacity-idle: 0.72;
            --hud-opacity-active: 1;
            --float-duration: 4.8s;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            background:
                radial-gradient(circle at top, rgba(47, 79, 130, 0.18), transparent 35%),
                linear-gradient(180deg, #040611 0%, #02040a 100%);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        button,
        a {
            -webkit-tap-highlight-color: transparent;
        }

        .app-shell {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            padding: max(1rem, env(safe-area-inset-top)) 1rem 0;
        }

        .hero-copy {
            max-width: min(38rem, calc(100vw - 7rem));
            padding: 1rem 1.1rem;
            border: 1px solid var(--border);
            border-radius: var(--hud-radius);
            background: rgba(12, 12, 20, 0.10);
            backdrop-filter: blur(var(--hud-blur));
            -webkit-backdrop-filter: blur(var(--hud-blur));
            box-shadow: var(--shadow);
            pointer-events: auto;
            opacity: var(--hud-opacity-idle);
            transition: opacity 0.35s ease;
        }

        .hero-copy:hover {
            opacity: var(--hud-opacity-active);
        }

        .eyebrow {
            margin: 0 0 0.45rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .hero-copy h1 {
            margin: 0;
            font-size: clamp(1.15rem, 1rem + 1.3vw, 2rem);
            line-height: 1.15;
        }

        .instruction {
            margin: 0.65rem 0 0;
            color: var(--muted);
            font-size: clamp(0.9rem, 0.85rem + 0.35vw, 1rem);
            line-height: 1.5;
        }

        .socials {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            pointer-events: auto;
        }

        .social-link,
        button {
            appearance: none;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(12, 12, 20, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            color: var(--text);
            text-decoration: none;
            font: inherit;
            letter-spacing: 0.02em;
            transition:
                transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.28s ease,
                border-color 0.28s ease,
                box-shadow 0.28s ease,
                opacity 0.28s ease;
            opacity: var(--hud-opacity-idle);
        }

        .social-link {
            padding: 0.7rem 0.95rem;
            text-align: center;
            min-width: 7.5rem;
        }

        button {
            padding: 0.75rem 1.05rem;
            cursor: pointer;
        }

        button:hover,
        button:focus-visible,
        .social-link:hover,
        .social-link:focus-visible {
            transform: translateY(-3px);
            border-color: var(--border-accent);
            background: rgba(116, 248, 255, 0.06);
            box-shadow:
                0 0 0 1px rgba(116, 248, 255, 0.10),
                0 4px 18px rgba(116, 248, 255, 0.08),
                0 8px 24px rgba(0, 0, 0, 0.14);
            opacity: var(--hud-opacity-active);
            outline: none;
        }

        button.active {
            border-color: rgba(116, 248, 255, 0.38);
            background: rgba(116, 248, 255, 0.07);
            box-shadow:
                0 0 0 1px rgba(116, 248, 255, 0.14),
                0 2px 12px rgba(116, 248, 255, 0.10),
                inset 0 0 12px rgba(116, 248, 255, 0.04);
            opacity: var(--hud-opacity-active);
            color: var(--accent);
        }

        .control-dock {
            position: fixed;
            left: 50%;
            bottom: max(1rem, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: min(calc(100vw - 1.5rem), 62rem);
            padding: 0.65rem 0.85rem;
            border: 1px solid var(--border);
            border-radius: var(--hud-radius);
            background: var(--panel-strong);
            backdrop-filter: blur(var(--hud-blur));
            -webkit-backdrop-filter: blur(var(--hud-blur));
            box-shadow:
                0 2px 20px rgba(0, 0, 0, 0.14),
                0 0 0 0.5px rgba(255, 255, 255, 0.05),
                inset 0 0.5px 0 rgba(255, 255, 255, 0.06);
            pointer-events: auto;
            opacity: var(--hud-opacity-idle);
            animation: hud-float var(--float-duration) ease-in-out infinite;
            transition: opacity 0.35s ease;
        }

        .control-dock:hover {
            opacity: var(--hud-opacity-active);
            animation-play-state: paused;
        }

        .controls {
            flex: 1;
            display: flex;
            gap: 0.7rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .controls::-webkit-scrollbar {
            display: none;
        }

        .controls button {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        .icon-button {
            flex: 0 0 auto;
            min-width: 8rem;
        }

        .footer {
            position: fixed;
            right: 1rem;
            bottom: calc(max(1rem, env(safe-area-inset-bottom)) + 5.8rem);
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.83rem;
            pointer-events: none;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            padding: 0.9rem 1.2rem;
            border: 1px solid rgba(116, 248, 255, 0.32);
            border-radius: 999px;
            background: rgba(5, 10, 18, 0.72);
            color: var(--accent);
            font-size: 0.92rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: 0 12px 42px rgba(0, 0, 0, 0.28);
            animation: pulse 1.35s ease-in-out infinite;
            pointer-events: none;
        }

        .input_video {
            display: none;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(0.98);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.02);
            }
        }

        @keyframes hud-float {
            0%,
            100% {
                transform: translateX(-50%) translateY(0px);
            }

            50% {
                transform: translateX(-50%) translateY(-4px);
            }
        }

        @media (max-width: 900px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .hero-copy {
                max-width: none;
            }

            .socials {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .social-link {
                min-width: 0;
            }
        }

        @media (max-width: 700px) {
            .top-bar {
                padding-inline: 0.75rem;
            }

            .hero-copy {
                padding: 0.9rem 1rem;
            }

            .control-dock {
                left: 0.75rem;
                right: 0.75rem;
                width: auto;
                transform: none;
                flex-direction: column;
                align-items: stretch;
                gap: 0.7rem;
                padding: 0.7rem;
                border-radius: 1.1rem;
            }

            .controls {
                gap: 0.55rem;
            }

            .controls button,
            .icon-button {
                min-height: 2.85rem;
            }

            .footer {
                right: 0.85rem;
                bottom: calc(max(1rem, env(safe-area-inset-bottom)) + 8.4rem);
                font-size: 0.75rem;
            }
        }

        @media (max-width: 520px) {
            .hero-copy {
                max-width: calc(100vw - 1.5rem);
            }

            .socials {
                gap: 0.55rem;
            }

            .social-link {
                flex: 1 1 calc(50% - 0.55rem);
            }

            .footer {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>
    <main class="app-shell">
        <div id="loading" role="status" aria-live="polite">Initializing particle field…</div>

        <header class="top-bar">
            <div class="hero-copy">
                <p class="eyebrow">Quantum Flux</p>
                <h1>Interactive particle gravity playground</h1>
                <p id="instruction" class="instruction">
                    Drag with mouse or touch to pull particles. Press and hold to energize the colors.
                </p>
            </div>

            <nav id="socials" class="socials" aria-label="Project links">
                <a href="https://github.com/yogender-ai/Particle-Gravity-Fun" target="_blank" rel="noreferrer"
                    class="social-link">GitHub</a>
                <a href="https://www.linkedin.com/in/yogender1/" target="_blank" rel="noreferrer"
                    class="social-link">LinkedIn</a>
            </nav>
        </header>

        <video class="input_video" aria-hidden="true"></video>

        <section class="control-dock" aria-label="Particle shapes">
            <div class="controls" role="toolbar" aria-label="Visual modes">
                <button type="button" data-mode="swarm" class="active" aria-pressed="true">Swarm</button>
                <button type="button" data-mode="heart" aria-pressed="false">Heart</button>
                <button type="button" data-mode="saturn" aria-pressed="false">Saturn</button>
                <button type="button" data-mode="flower" aria-pressed="false">Flower</button>
                <button type="button" data-mode="fireworks" aria-pressed="false">Fireworks</button>
            </div>
            <button id="fullscreen-toggle" type="button" class="icon-button" aria-label="Toggle fullscreen"
                title="Toggle fullscreen">Fullscreen</button>
        </section>

        <footer class="footer">
            <span>Created by Yogender</span>
        </footer>
    </main>

    <script src="app.min.js"></script>
</body>

</html>
